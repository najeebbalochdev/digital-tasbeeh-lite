name: digital_tasbeeh_lite
description: A beautiful minimal digital Tasbeeh counter with analytics and themes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Ads
  google_mobile_ads: ^5.1.0

  # Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.3.2

  # Haptic Feedback
  vibration: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^14.2.0

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11

  # Icons Generator
  flutter_launcher_icons: ^0.13.1

  # Linting
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700